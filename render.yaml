services:
  - type: web
    name: website-deployer
    runtime: node
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: sites-data
      mountPath: /var/data
      sizeGB: 1
